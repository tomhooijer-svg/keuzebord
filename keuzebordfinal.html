<!DOCTYPE html>
<html lang="nl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Keuzebord – Het Kompas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<style>
#header{
  position:fixed;top:0;left:0;right:0;z-index:200;
  height:46px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  display:flex;
  align-items:center;
  padding:0 14px;
  gap:0;
}
.hdr-l{flex:1;display:flex;align-items:center;justify-content:flex-start;min-width:0;overflow:hidden}
.hdr-m{flex:1;display:flex;align-items:center;justify-content:center;min-width:0;overflow:hidden}
.hdr-r{flex:1;display:flex;align-items:center;justify-content:flex-end;gap:6px;flex-shrink:0}
.logo{font-size:.98rem;font-weight:800;white-space:nowrap;letter-spacing:-.3px}
.logo .w1{color:var(--primary)}
.logo .w2{color:var(--text)}
.htime{font-size:.7rem;font-weight:600;color:var(--sub);text-align:center;line-height:1.35;white-space:nowrap}
.hact{display:flex;align-items:center;gap:5px}
.hdr-klas{font-size:.72rem;font-weight:700;color:var(--sub);white-space:nowrap}
.hdr-btn{padding:3px 10px!important;font-size:.73rem!important;height:28px;line-height:1}
.fs-btn{background:none;border:1.5px solid var(--border);border-radius:6px;cursor:pointer;width:28px;height:28px;display:flex;align-items:center;justify-content:center;font-size:.85rem;color:var(--sub);transition:all .12s;flex-shrink:0}
.fs-btn:hover{border-color:var(--primary);color:var(--primary)}
:root{
  --bg:#f4f6f9;--surface:#fff;--border:#e2e6ed;
  --primary:#3b6ff0;--danger:#d94f4f;--success:#2e9e6b;
  --text:#1a2233;--sub:#6b7a94;--faint:#f0f2f6;
  --shadow:0 1px 6px rgba(0,0,0,.07),0 2px 16px rgba(0,0,0,.05);
  --radius:12px;--card-h:160px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{height:100%;overflow:hidden}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);touch-action:none;user-select:none}
.screen{display:none;width:100vw;height:100vh;position:absolute;top:0;left:0}
.screen.active{display:flex}

/* HEADER */












/* BUTTONS */
.btn{font-family:'Inter',sans-serif;font-weight:700;font-size:.82rem;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;transition:all .13s;display:inline-flex;align-items:center;gap:5px;white-space:nowrap;letter-spacing:-.1px}
.btn:hover{filter:brightness(1.07);transform:translateY(-1px)}.btn:active{transform:scale(.97)}
.btn-primary{background:var(--primary);color:#fff}
.btn-danger{background:var(--danger);color:#fff}
.btn-success{background:var(--success);color:#fff}
.btn-ghost{background:transparent;color:var(--primary);border:1.5px solid var(--border)}
.btn-ghost:hover{border-color:var(--primary);background:var(--faint)}
.btn-dark{background:var(--text);color:#fff}
.btn-sm{font-size:.76rem;padding:5px 10px;border-radius:7px}
.btn-lg{font-size:.9rem;padding:11px 22px;border-radius:10px}

/* KLAS PICKER (welcome) */
#screen-klasselect{flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:20px}
#screen-klasselect h1{font-size:1.7rem;font-weight:800;letter-spacing:-.5px}
.kdate{font-size:.88rem;font-weight:600;color:var(--sub)}
.klas-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:700px}
.klas-card{
  background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);
  cursor:pointer;transition:all .14s;overflow:hidden;min-width:160px;max-width:200px;flex:1;
  box-shadow:var(--shadow);
}
.klas-card:hover{border-color:var(--primary);transform:translateY(-2px);box-shadow:0 4px 20px rgba(59,111,240,.12)}
.klas-card.kactive{border-color:var(--success);}
.kc-thumb{width:100%;aspect-ratio:16/9;background:var(--faint);overflow:hidden;display:flex;align-items:center;justify-content:center;position:relative}
.kc-thumb img{width:100%;height:100%;object-fit:cover}
.kc-ph{width:40px;height:26px;background:var(--border);border-radius:4px}
.kc-active-badge{position:absolute;top:6px;right:6px;background:var(--success);color:#fff;font-size:.6rem;font-weight:800;padding:2px 6px;border-radius:10px;letter-spacing:.2px}
.kc-body{padding:10px 12px}
.kc-name{font-size:.84rem;font-weight:700;color:var(--text)}
.kc-sub{font-size:.68rem;color:var(--sub);font-weight:500;margin-top:2px}

/* WELCOME (board chooser inside a klas) */
#screen-welcome{flex-direction:column;align-items:center;justify-content:center;background:var(--bg);gap:20px;padding-top:46px}
#screen-welcome h2{font-size:1.4rem;font-weight:800;letter-spacing:-.4px}
.wdate{font-size:.88rem;font-weight:600;color:var(--sub)}
.wb-grid{display:flex;flex-wrap:wrap;gap:12px;justify-content:center;max-width:700px}
.wb-card{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);cursor:pointer;transition:all .14s;overflow:hidden;min-width:150px;max-width:190px;flex:1;box-shadow:var(--shadow)}
.wb-card:hover{border-color:var(--primary);transform:translateY(-2px)}
.wb-thumb{width:100%;aspect-ratio:16/9;background:var(--faint);overflow:hidden;display:flex;align-items:center;justify-content:center}
.wb-thumb img{width:100%;height:100%;object-fit:cover}
.wb-ph{width:34px;height:22px;background:var(--border);border-radius:4px}
.wb-info{padding:9px 11px}
.wb-name{font-size:.82rem;font-weight:700}
.wb-sub{font-size:.68rem;color:var(--sub);font-weight:500;margin-top:2px}

/* BOARD */
#screen-board{flex-direction:column;padding-top:46px;overflow:hidden}
#board-wrap{flex:1;display:flex;flex-direction:column;padding:8px;gap:6px;overflow:hidden;min-height:0}
#children-strip{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:6px 12px;display:flex;flex-wrap:wrap;gap:7px;align-items:center;min-height:0;transition:border-color .15s,background .15s;box-shadow:var(--shadow);flex-shrink:0}
.strip-label{font-size:.66rem;font-weight:700;color:var(--sub);text-transform:uppercase;letter-spacing:.6px;width:100%;margin-bottom:2px}
.strip-empty{font-size:.8rem;font-weight:600;color:var(--success)}
#hoeken-grid{flex:1;display:grid;gap:8px;overflow:hidden}

/* HOEK CARD */
.hoek-card{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);box-shadow:var(--shadow);display:flex;flex-direction:row;overflow:hidden;height:100%;transition:border-color .16s,box-shadow .16s,transform .11s}
.hoek-card.drag-over{border-color:var(--primary)!important;box-shadow:0 0 0 3px rgba(59,111,240,.18);transform:scale(1.01)}
.hoek-card.full{border-color:#f5c6c6!important}
.hi{flex:0 0 40%;position:relative;overflow:hidden;background:var(--faint);border-radius:10px 0 0 10px}
.hi img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:center;background:var(--faint)}
.hi-empty{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px}
.hi-empty-bar{width:40px;height:5px;background:var(--border);border-radius:3px}
.hi-label{position:absolute;bottom:0;left:0;right:0;background:rgba(26,34,51,.55);color:#fff;font-size:.7rem;font-weight:700;padding:5px 8px;letter-spacing:-.1px}
.hk{flex:1;display:flex;flex-direction:column;padding:6px 8px;min-width:0;border-left:1px solid var(--border);overflow:visible}
.hk-head{display:flex;align-items:center;margin-bottom:4px;gap:4px;flex-shrink:0}
.hk-name{font-size:.75rem;font-weight:700;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.hk-cap{font-size:.66rem;font-weight:700;color:var(--sub);background:var(--faint);border-radius:20px;padding:2px 7px;flex-shrink:0;border:1px solid var(--border)}
.hk-cap.ok{color:var(--success);border-color:#b6f0d8;background:#edfaf3}
.hk-cap.full{color:var(--danger);border-color:#f5c6c6;background:#fff0f0}
.hk-kids{display:flex;flex-wrap:wrap;gap:4px;flex:1;align-content:flex-start;overflow:hidden;padding:2px}

/* PICTO CHIP */
.picto-chip{display:flex;flex-direction:column;align-items:center;gap:2px;cursor:grab;position:relative;-webkit-tap-highlight-color:transparent}
.picto-chip:active{cursor:grabbing}
.picto-chip.dragging{opacity:.15;pointer-events:none!important}
.pa{width:60px;height:60px;border-radius:50%;border:2.5px solid #fff;box-shadow:0 1px 6px rgba(0,0,0,.14);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff;overflow:hidden;background-size:cover;background-position:center;position:relative;flex-shrink:0;transition:transform .11s}
.picto-chip:hover .pa{transform:scale(1.08)}
#children-strip .pa{width:56px;height:56px}
.pname{font-size:.6rem;font-weight:700;text-align:center;max-width:64px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;color:var(--sub)}
.dice-b{position:absolute;top:-3px;right:-3px;width:17px;height:17px;background:#f0b429;border-radius:4px;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.52rem;font-weight:800;color:#7c4f00}
.lock-b{position:absolute;bottom:-2px;right:-2px;width:16px;height:16px;background:var(--danger);border-radius:50%;border:2px solid #fff;display:flex;align-items:center;justify-content:center;font-size:.46rem;color:#fff;font-weight:700}
.lock-b::after{content:'L'}
.timer-ring{position:absolute;inset:-3px;border-radius:50%;pointer-events:none}
.timer-ring svg{width:100%;height:100%;transform:rotate(-90deg)}
.timer-ring circle{fill:none;stroke:#f0b429;stroke-width:2.5;stroke-linecap:round}
.override-btn{position:absolute;top:-4px;left:-4px;width:18px;height:18px;background:var(--text);border-radius:50%;border:2px solid #fff;display:none;align-items:center;justify-content:center;font-size:.5rem;cursor:pointer;color:#fff;z-index:10;font-weight:700}
.override-btn::after{content:'↑'}
.picto-chip:hover .override-btn{display:flex}

/* ADMIN */
#screen-admin{flex-direction:column;padding-top:46px;overflow:hidden;background:var(--bg)}
#admin-bar{display:flex;align-items:center;gap:8px;padding:10px 18px;background:var(--surface);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
.bar-title{font-weight:700;font-size:.88rem;flex:1;color:var(--sub);min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#admin-tabs{display:flex;gap:0;padding:0 18px;background:var(--surface);border-bottom:1px solid var(--border);overflow-x:auto;flex-shrink:0}
.atab{font-family:'Inter',sans-serif;font-weight:600;font-size:.79rem;padding:10px 14px;border:none;border-bottom:2.5px solid transparent;cursor:pointer;background:transparent;color:var(--sub);transition:all .12s;white-space:nowrap}
.atab.active{color:var(--primary);border-bottom-color:var(--primary)}
.atab:hover:not(.active){color:var(--text);background:var(--faint)}
#admin-content{flex:1;overflow:auto;padding:20px 18px}
.apanel{display:none}.apanel.active{display:block}

/* Forms */
.fg{margin-bottom:14px}
.fg label{display:block;font-weight:600;font-size:.76rem;margin-bottom:5px;color:var(--sub);text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{width:100%;font-family:'Inter',sans-serif;font-size:.88rem;font-weight:500;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;outline:none;transition:border-color .12s;background:#fff;color:var(--text)}
.fg input:focus,.fg select:focus{border-color:var(--primary)}
.hint{font-size:.72rem;color:var(--sub);font-weight:500;margin-top:3px}
.stepper{display:flex;align-items:center;border:1.5px solid var(--border);border-radius:8px;overflow:hidden;width:96px}
.stepper button{font-family:'Inter',sans-serif;font-weight:700;font-size:1rem;border:none;background:var(--faint);color:var(--primary);width:32px;height:34px;cursor:pointer;transition:background .1s;flex-shrink:0}
.stepper button:hover{background:var(--border)}
.stepper .sv{flex:1;text-align:center;font-weight:700;font-size:.88rem}

/* List cards */
.ac{background:var(--surface);border-radius:var(--radius);border:1.5px solid var(--border);padding:11px 13px;margin-bottom:8px;display:flex;align-items:center;gap:10px}
.ac .ai{flex:1}.ac .at{font-weight:700;font-size:.85rem}.ac .as{font-size:.71rem;color:var(--sub);font-weight:500;margin-top:2px}
.ac-thumb{width:64px;height:40px;border-radius:7px;overflow:hidden;background:var(--faint);display:flex;align-items:center;justify-content:center;flex-shrink:0;border:1px solid var(--border)}
.ac-thumb img{width:100%;height:100%;object-fit:cover}
.ac-avatar{width:40px;height:40px;border-radius:50%;overflow:hidden;background:var(--faint);display:flex;align-items:center;justify-content:center;font-size:1rem;flex-shrink:0}
.ac-avatar img{width:100%;height:100%;object-fit:cover}

/* Section title */
.stitle{font-size:.76rem;font-weight:700;letter-spacing:.5px;text-transform:uppercase;color:var(--sub);margin-bottom:12px;display:flex;align-items:center;gap:6px}
.stitle .badge{background:var(--primary);color:#fff;font-size:.6rem;padding:1px 6px;border-radius:20px;font-weight:700;text-transform:none;letter-spacing:0}

/* Divider */
.divider{height:1px;background:var(--border);margin:16px 0}

/* Toggle */
.trow{display:flex;align-items:center;justify-content:space-between;padding:11px 0;border-bottom:1px solid var(--border)}
.trow label{font-weight:600;font-size:.85rem;color:var(--text)}
.trow input[type=checkbox]{width:36px;height:19px;accent-color:var(--primary);cursor:pointer}

/* Photo lib */
.photo-lib{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;margin-bottom:12px}
.photo-item{border-radius:8px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:all .13s;position:relative;background:var(--faint)}
.photo-item img{width:100%;aspect-ratio:16/9;object-fit:cover;display:block}
.photo-item.selected{border-color:var(--primary);box-shadow:0 0 0 2px rgba(59,111,240,.15)}
.photo-item .pil{position:absolute;bottom:0;left:0;right:0;background:rgba(26,34,51,.7);color:#fff;font-size:.58rem;font-weight:700;padding:3px 5px;text-align:center;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.pi-del{position:absolute;top:3px;right:3px;width:18px;height:18px;background:var(--danger);border-radius:50%;border:none;cursor:pointer;font-size:.6rem;color:#fff;display:none;align-items:center;justify-content:center;font-weight:700}
.photo-item:hover .pi-del{display:flex}

/* Board cards */
.bcard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;display:flex;overflow:hidden;cursor:pointer;transition:all .13s;box-shadow:var(--shadow)}
.bcard:hover{border-color:var(--primary)}.bcard.bactive{border-color:var(--success)}
.bcard-thumb{width:72px;flex-shrink:0;background:var(--faint);display:flex;align-items:center;justify-content:center;overflow:hidden;border-right:1px solid var(--border)}
.bcard-thumb img{width:100%;height:100%;object-fit:cover}
.bcard-thumb-ph{width:28px;height:18px;background:var(--border);border-radius:4px}
.bcard-info{flex:1;padding:10px 12px}
.bcard-name{font-weight:700;font-size:.86rem}
.bcard-sub{font-size:.7rem;color:var(--sub);font-weight:500;margin-top:2px}
.bcard-act{display:flex;flex-direction:column;justify-content:center;gap:5px;padding:8px}

/* Klas cards in admin */
.klcard{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);margin-bottom:8px;display:flex;overflow:hidden;transition:all .13s;box-shadow:var(--shadow)}
.klcard.klactive{border-color:var(--success)}
.kl-info{flex:1;padding:11px 13px}
.kl-name{font-weight:700;font-size:.88rem}
.kl-sub{font-size:.71rem;color:var(--sub);font-weight:500;margin-top:2px}
.kl-act{display:flex;flex-direction:column;justify-content:center;gap:5px;padding:8px}

/* Stats */
.sgrid{display:grid;grid-template-columns:repeat(auto-fill,minmax(140px,1fr));gap:8px;margin-bottom:16px}
.scard{background:var(--surface);border-radius:var(--radius);padding:14px;border:1.5px solid var(--border)}
.scard .sn{font-size:1.7rem;font-weight:800;color:var(--primary)}
.scard .sl{font-size:.72rem;font-weight:600;color:var(--sub);margin-top:2px}
.sugg{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);border-left:3px solid #f0b429;padding:11px 13px;margin-bottom:8px;font-size:.83rem;font-weight:500;line-height:1.5}
.dsr{display:flex;gap:7px;align-items:center;padding:8px 0;border-bottom:1px solid var(--border);font-size:.82rem;font-weight:500}
.dsr .dc{font-weight:700;min-width:80px}
.dtag{font-size:.67rem;font-weight:700;padding:2px 7px;border-radius:20px;color:#fff;background:var(--primary)}

/* Upload */
.uarea{border:1.5px dashed var(--border);border-radius:9px;padding:14px;text-align:center;cursor:pointer;transition:all .13s;font-size:.78rem;color:var(--sub);font-weight:600}
.uarea:hover{border-color:var(--primary);background:var(--faint);color:var(--primary)}
.uarea input[type=file]{display:none}

/* Copy-from-klas picker */
.kpick-item{display:flex;align-items:center;gap:10px;padding:8px 0;border-bottom:1px solid var(--border);cursor:pointer;font-size:.84rem;font-weight:500}
.kpick-item:hover{color:var(--primary)}
.kpick-check{width:16px;height:16px;accent-color:var(--primary)}

/* Closed */
#screen-closed{flex-direction:column;align-items:center;justify-content:center;background:#1a2233;gap:14px}
#screen-closed h2{color:#fff;font-size:1.6rem;font-weight:800}
#screen-closed p{color:rgba(255,255,255,.5);font-size:.85rem}

/* Modal */
#modal-overlay{position:fixed;inset:0;z-index:500;background:rgba(26,34,51,.5);display:none;align-items:center;justify-content:center;backdrop-filter:blur(4px);padding:18px}
#modal-overlay.active{display:flex}
#modal{background:#fff;border-radius:14px;padding:22px;max-width:520px;width:100%;box-shadow:0 20px 60px rgba(0,0,0,.2);animation:popIn .16s cubic-bezier(.34,1.56,.64,1);max-height:90vh;overflow-y:auto}
@keyframes popIn{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
#modal h3{font-size:1.05rem;font-weight:800;margin-bottom:14px}
#modal-btns{display:flex;gap:7px;margin-top:16px;justify-content:flex-end;flex-wrap:wrap}

/* Toast */
#toast{position:fixed;bottom:18px;left:50%;transform:translateX(-50%) translateY(80px);background:var(--text);color:#fff;font-weight:700;font-size:.82rem;padding:9px 18px;border-radius:24px;box-shadow:0 4px 16px rgba(0,0,0,.18);transition:transform .24s cubic-bezier(.34,1.56,.64,1);z-index:600;white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* PIN */
#pin-overlay{position:fixed;inset:0;z-index:700;background:rgba(26,34,51,.68);display:none;align-items:center;justify-content:center;backdrop-filter:blur(6px)}
#pin-overlay.active{display:flex}
#pin-box{background:#fff;border-radius:14px;padding:24px;text-align:center;width:280px;box-shadow:0 20px 60px rgba(0,0,0,.25)}
#pin-box h3{font-size:1rem;font-weight:800;margin-bottom:4px}
#pin-box p{color:var(--sub);font-size:.76rem;margin-bottom:14px;font-weight:500}
#pin-display{font-size:1.6rem;letter-spacing:10px;font-weight:800;color:var(--primary);margin-bottom:12px;min-height:40px}
.pingrid{display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
.pbtn{aspect-ratio:1;border:1.5px solid var(--border);border-radius:9px;font-size:1.05rem;font-weight:700;background:#fff;cursor:pointer;font-family:'Inter',sans-serif;transition:all .1s;color:var(--text)}
.pbtn:hover{background:var(--faint);border-color:var(--primary)}.pbtn:active{transform:scale(.93)}
.perr{color:var(--danger);font-size:.74rem;font-weight:700;margin-top:7px}

.cswatch{width:26px;height:26px;border-radius:6px;cursor:pointer;border:2.5px solid transparent;transition:all .1s;flex-shrink:0}
.cswatch.sel{border-color:var(--text)!important}
.cswatch:hover{transform:scale(1.12)}

::-webkit-scrollbar{width:4px;height:4px}::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* Ghost chip (werkplaats geplande slots) */
@keyframes thema-fall{0%{transform:translateY(-20px) rotate(0deg);opacity:.6}100%{transform:translateY(100vh) rotate(360deg);opacity:.1}}
.ghost-chip .pa{filter:grayscale(55%);opacity:.55!important;}
.ghost-chip{cursor:default!important;}
.hoek-card{transition:border-color .4s;}

/* Capacity slots */
.cap-slots{display:flex;flex-wrap:wrap;gap:8px;padding:4px 0 8px;flex-shrink:0;align-content:flex-start;overflow:visible}
.cap-slot{width:52px;height:52px;border-radius:50%;border:2.5px dashed #c8c8c8;background:#f5f5f7;flex-shrink:0;position:relative;overflow:hidden;transition:border-color .1s,background .1s}
.cap-slot.active{border-color:var(--primary);background:rgba(59,111,240,.12);box-shadow:0 0 0 3px rgba(59,111,240,.2)}
.cap-slot.filled{border:none;background:transparent;overflow:visible;width:auto;height:auto}
.cap-slot img{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;border-radius:50%}
.cap-slot .cap-init{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;color:#fff}
#children-strip.drag-over-strip{border-color:var(--primary)!important;background:rgba(59,111,240,.06)!important}

/* Fullscreen support */
:fullscreen #header,:-webkit-full-screen #header,:-moz-full-screen #header{display:flex!important}
:fullscreen body,:-webkit-full-screen body{overflow:hidden}
</style>
</head>
<body>

<!-- PIN -->
<div id="pin-overlay">
  <div id="pin-box">
    <h3 id="pin-title">Beheer</h3>
    <p id="pin-sub">Voer de PIN in</p>
    <div id="pin-display">_ _ _ _</div>
    <div class="pingrid">
      <button class="pbtn" onclick="pinPress('1')">1</button><button class="pbtn" onclick="pinPress('2')">2</button><button class="pbtn" onclick="pinPress('3')">3</button>
      <button class="pbtn" onclick="pinPress('4')">4</button><button class="pbtn" onclick="pinPress('5')">5</button><button class="pbtn" onclick="pinPress('6')">6</button>
      <button class="pbtn" onclick="pinPress('7')">7</button><button class="pbtn" onclick="pinPress('8')">8</button><button class="pbtn" onclick="pinPress('9')">9</button>
      <button class="pbtn" onclick="pinPress('back')">⌫</button><button class="pbtn" onclick="pinPress('0')">0</button>
      <button class="pbtn" onclick="pinPress('cancel')" style="font-size:.7rem;color:var(--sub)">Sluit</button>
    </div>
    <div id="pin-error" class="perr"></div>
  </div>
</div>

<div id="header" style="display:none">
  <div class="hdr-l"><div class="logo"><span class="w1">Keuze</span><span class="w2">bord</span></div></div>
  <div class="hdr-m"><div class="htime" id="htime"></div></div>
  <div class="hdr-r"><div id="hact" class="hact"></div><button id="fs-btn" onclick="toggleFullscreen()" class="fs-btn" title="Volledig scherm">⛶</button></div>
</div>
<div id="toast"></div>

<div id="modal-overlay">
  <div id="modal">
    <h3 id="modal-title"></h3>
    <div id="modal-body"></div>
    <div id="modal-btns"></div>
  </div>
</div>

<!-- KLAS SELECT -->
<div id="screen-klasselect" class="screen active">
  <h1>Keuzebord</h1>
  <div class="kdate" id="klas-date"></div>
  <div class="klas-grid" id="klas-grid"></div>
  <button class="btn btn-ghost" onclick="openAdminFromKlasSelect()">Beheer</button>
</div>

<!-- WELCOME (bord select binnen klas) -->
<div id="screen-welcome" class="screen">
  <h2 id="welcome-klas-naam"></h2>
  <div class="wdate" id="welcome-date"></div>
  <div class="wb-grid" id="wb-grid"></div>
  <div style="display:flex;gap:10px;flex-wrap:wrap;justify-content:center;margin-top:4px">
    <button class="btn btn-ghost" onclick="showScreen('klasselect');renderKlasSelect()">Andere klas</button>
    <button class="btn btn-ghost" onclick="openAdmin()">Beheer</button>
  </div>
</div>

<!-- BOARD -->
<div id="screen-board" class="screen">
  <div id="board-wrap">
    <div id="children-strip"><div class="strip-label">Nog te kiezen</div></div>
    <div id="status-quick-bar" style="display:flex;align-items:center;gap:10px;padding:6px 14px;background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);font-size:.78rem;color:var(--sub);flex-wrap:wrap">
      <span id="status-counts" style="flex:1"></span>
      <button class="btn btn-ghost btn-sm" style="font-size:.72rem" onclick="openStatusOverzicht()">👥 Aanwezigheid</button>
    </div>
    <div id="hoeken-grid"></div>
  </div>
</div>

<!-- ADMIN -->
<div id="screen-admin" class="screen">
  <div id="admin-bar">
    <span class="bar-title" id="admin-bar-title">Beheer</span>
    <button class="btn btn-dark" onclick="saveAndBack()">Opslaan &amp; terug</button>
    <button class="btn btn-ghost" onclick="goBackFromAdmin()">Terug</button>
  </div>
  <div id="admin-tabs">
    <button class="atab active" onclick="switchTab('klassen',this)">Klassen</button>
    <button class="atab" onclick="switchTab('borden',this)">Borden</button>
    <button class="atab" onclick="switchTab('hoeken',this)">Hoeken</button>
    <button class="atab" onclick="switchTab('leerlingen',this)">Leerlingen</button>
    <button class="atab" onclick="switchTab('fotos',this)">Foto's</button>
    <button class="atab" onclick="switchTab('instellingen',this)">Instellingen</button>
    <button class="atab" onclick="switchTab('statistieken',this)">Statistieken</button>
    <button class="atab" onclick="switchTab('suggesties',this)">Suggesties</button>
    <button class="atab" onclick="switchTab('weekplanner',this)">📅 Weekplanner</button>
    <button class="atab" onclick="switchTab('werkplaats',this)">🔨 Werkplaats</button>
    <button class="atab" onclick="switchTab('groepjes',this)">👥 Groepjes</button>
  </div>
  <div id="admin-content">
    <div id="panel-klassen" class="apanel active"></div>
    <div id="panel-borden" class="apanel"></div>
    <div id="panel-hoeken" class="apanel"></div>
    <div id="panel-leerlingen" class="apanel"></div>
    <div id="panel-fotos" class="apanel"></div>
    <div id="panel-instellingen" class="apanel"></div>
    <div id="panel-statistieken" class="apanel"></div>
    <div id="panel-suggesties" class="apanel"></div>
    <div id="panel-weekplanner" class="apanel"></div>
    <div id="panel-werkplaats" class="apanel"></div>
    <div id="panel-groepjes" class="apanel"></div>
  </div>
</div>

<!-- CLOSED -->
<div id="screen-closed" class="screen">
  <h2>Dag afgesloten</h2>
  <p id="closed-sum"></p>
  <div style="display:flex;gap:10px;margin-top:18px;flex-wrap:wrap;justify-content:center">
    <button class="btn btn-primary btn-lg" onclick="reopenDay()">Heropenen</button>
    <button class="btn btn-ghost btn-lg" onclick="openAdmin()">Statistieken</button>
  </div>
</div>

//
// Global: klassen[], activeKlasId, globalSettings
// Per klas: { id, naam, borden[], activeBordId, hoekLib[], fotoLib[], leerlingen[], weekData[] }
// Each bord: { id, naam, hoekLibIds[], plaatsingen{}, dagOpen, dagGesloten, dagStart }
// Each hoek: { id, naam, maxKinderen, fotoId }

const DEF_PIN='1234';
const KID_COLORS=['#3b6ff0','#d94f4f','#2e9e6b','#c8820a','#7c5cbf','#b8436d','#c06428','#1a9aad'];
const STORE_KEY='kb_v5';

function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2,6);}

function newKlas(naam){
  const b={id:'b'+uid(),naam:'Mijn eerste bord',hoekLibIds:[],plaatsingen:{},dagOpen:false,dagGesloten:false,dagStart:null,thema:'geen',themaEigenBg:'',themaEigenAccent:'',werkplaatsSlots:{}};
  return {
    id:'k'+uid(), naam,
    borden:[b], activeBordId:b.id,
    hoekLib:[
      {id:'hl'+uid(),naam:'Bouwhoek',maxKinderen:4,fotoId:null},
      {id:'hl'+uid(),naam:'Huishoek',maxKinderen:3,fotoId:null},
      {id:'hl'+uid(),naam:'Leeshoek',maxKinderen:3,fotoId:null},
      {id:'hl'+uid(),naam:'Schilderhoek',maxKinderen:2,fotoId:null},
    ],
    fotoLib:[],
    leerlingen:[],
    weekData:[],
    groepjes:[],
    werkplaatsTaken:[],
    weekplannerWeken:[]
  };
}

function defaultGlobal(){
  const k=newKlas('Groep 1/2');
  k.borden[0].hoekLibIds=k.hoekLib.map(h=>h.id);
  k.hoekLib.forEach(h=>k.borden[0].plaatsingen[h.id]=[]);
  return {
    klassen:[k], activeKlasId:k.id,
    settings:{timerEnabled:true,timerDuur:10,diceVisible:true,pinEnabled:true,pinCode:DEF_PIN,cols:3,toonNietInKlas:false,toonStatusBalk:false}
  };
}

let G=(()=>{
  try{
    const s=localStorage.getItem(STORE_KEY);
    if(s){
      const p=JSON.parse(s);
      // migrations
      if(!p.klassen){
        // migrate from v4 format
        const k=newKlas('Mijn klas');
        k.borden=p.borden||[]; k.activeBordId=p.activeBordId||k.borden[0]?.id;
        k.hoekLib=p.hoekLib||[]; k.fotoLib=p.fotoLib||[];
        k.leerlingen=p.leerlingen||[]; k.weekData=p.weekData||[];
        k.borden.forEach(b=>{if(!b.hoekLibIds) b.hoekLibIds=[];if(!b.plaatsingen) b.plaatsingen={};});
        if(k.borden[0]?.hoekLibIds?.length===0) k.borden[0].hoekLibIds=k.hoekLib.map(h=>h.id);
        k.hoekLib.forEach(h=>{if(!k.borden[0].plaatsingen[h.id]) k.borden[0].plaatsingen[h.id]=[];});
        return {klassen:[k],activeKlasId:k.id,settings:p.settings||defaultGlobal().settings};
      }
      if(!p.settings) p.settings=defaultGlobal().settings;
      return p;
    }
  }catch(e){}
  return defaultGlobal();
})();

  {id:'diwali',     naam:'✨ Diwali',          bg:'#1a0a00', accent:'#ffd600', cardBg:'#2d1a00', stripBg:'#3d2800',particles:['✨','🪔','🎆','💫']},
  {id:'carnaval',   naam:'🎭 Carnaval',       bg:'#1a003a', accent:'#ff80ab', cardBg:'#2d0050', stripBg:'#4a006a',particles:['🎭','🎊','🎈','🎉']},
  {id:'eigen',      naam:'🎨 Eigen kleur',    bg:'',        accent:'',        cardBg:'',        stripBg:'',       particles:null},
];
function getBordTheme(id){return BORD_THEMES.find(function(t){return t.id===id;})||BORD_THEMES[0];}
function applyBordTheme(bord){
  var t=bord?getBordTheme(bord.thema):BORD_THEMES[0];
  var bg=t.bg; var accent=t.accent; var cardBg=t.cardBg||''; var stripBg=t.stripBg||'';
  if(t.id==='eigen'&&bord){bg=bord.themaEigenBg||'';accent=bord.themaEigenAccent||'';}
  var bs=document.getElementById('screen-board');
  if(!bs) return;
  bs.style.background=bg||'var(--bg)';
  bs.style.setProperty('--bord-accent',accent||'var(--primary)');
  bs.style.setProperty('--bord-card-bg',cardBg||'var(--surface)');
  bs.style.setProperty('--bord-strip-bg',stripBg||'var(--surface)');
  // Update board header accent bar
  var headerAccent=document.getElementById('bord-thema-bar');
  if(!headerAccent){
    var boardBar=document.getElementById('board-bar');
    if(boardBar){headerAccent=document.createElement('div');headerAccent.id='bord-thema-bar';
      headerAccent.style.cssText='position:absolute;bottom:0;left:0;right:0;height:3px;transition:background .3s';
      boardBar.style.position='relative';boardBar.appendChild(headerAccent);}
  }
  if(headerAccent) headerAccent.style.background=accent||'var(--primary)';
  // Static thematic decoration (no moving particles - cleaner for classroom)
  var oldOv=document.getElementById('thema-particles');if(oldOv) oldOv.remove();
  if(t&&t.id!=='geen'&&t.id!=='eigen'&&t.accent){
    // Subtle emoji watermark in corner
    var ov=document.createElement('div');ov.id='thema-particles';
    var emojis=t.particles&&t.particles.length?t.particles:[];
    if(emojis.length){
      ov.style.cssText='position:fixed;bottom:16px;right:16px;pointer-events:none;z-index:1;display:flex;gap:6px;opacity:0.35;font-size:1.5rem;line-height:1';
      emojis.slice(0,3).forEach(function(e){var s=document.createElement('span');s.textContent=e;ov.appendChild(s);});
      document.getElementById('screen-board').appendChild(ov);
    }
  }
  // Apply accent to hoek cards
  document.querySelectorAll('.hoek-card').forEach(function(c){c.style.borderColor=accent?accent+'44':'';});
}

function save(){
  try{
    var s=JSON.parse(JSON.stringify(G));
    s.klassen.forEach(function(k){
      k.leerlingen.forEach(function(l){if(l._c)l.image=null;});
      (k.fotoLib||[]).forEach(function(f){if(f._c)f.data='';});
    });
    localStorage.setItem(STORE_KEY,JSON.stringify(s));
  }catch(e){
    if(e.name==='QuotaExceededError'||e.name==='NS_ERROR_DOM_QUOTA_REACHED'){
      try{
        var s2=JSON.parse(JSON.stringify(G));
        s2.klassen.forEach(function(k){k.leerlingen.forEach(function(l){l.image=null;});(k.fotoLib||[]).forEach(function(f){f.data='';});});
        localStorage.setItem(STORE_KEY,JSON.stringify(s2));
      }catch(e2){localStorage.removeItem(STORE_KEY);}
    }
  }
}

function reattachRuntimeImages(){
  G.klassen.forEach(function(k){
    if(k.naam!=='Groep 1D') return;
    k.leerlingen.forEach(function(l){
      var s=GROEP_1D_LL.find(function(x){return x.naam===l.naam;});
      if(s&&s.img&&(!l.image||l._c)){l.image=s.img;l._c=true;}
    });
    (k.fotoLib||[]).forEach(function(f){
      var s=HOEK_FOTOS.find(function(x){return x.naam===f.naam;});
      if(s&&s.data&&!f.data){f.data=s.data;f._c=true;}
    });
  });
}
function getKlas(){return G.klassen.find(k=>k.id===G.activeKlasId)||G.klassen[0];}
function getActiveBord(){const k=getKlas();return k.borden.find(b=>b.id===k.activeBordId)||k.borden[0];}
function getBordHoeken(bord,klas){klas=klas||getKlas();return(bord.hoekLibIds||[]).map(id=>klas.hoekLib.find(h=>h.id===id)).filter(Boolean);}
function getFoto(id,klas){klas=klas||getKlas();const f=klas.fotoLib.find(f=>f.id===id);return f?f.data:null;}
function weekCount(lid,hid){const k=getKlas();let c=0;k.weekData.forEach(d=>{if((d.plaatsingen[hid]||[]).some(p=>p.leerlingId===lid)) c++;});return c;}

function renderBoard(){
  // Clean up any orphaned ghost elements
  document.querySelectorAll('[data-drag-ghost]').forEach(function(g){g.remove();});
  if(Object.keys(activeDrags).length>0){
    // Drag actief: stel renderBoard uit tot na drop
    clearTimeout(renderBoard._t);
    renderBoard._t=setTimeout(function(){renderBoard();},50);
    return;
  }
  applyBordTheme(getActiveBord());renderStrip();renderGrid();updateStatusCounts();
}

function renderStrip(){
  const strip=document.getElementById('children-strip');
  const k=getKlas(),b=getActiveBord();
  // Only count valid plaatsingen (existing + lid leerlingen)
  const placed=new Set(Object.values(b.plaatsingen).flat()
    .filter(p=>k.leerlingen.find(l=>l.id===p.leerlingId&&l.lid!==false))
    .map(p=>p.leerlingId));
  const free=k.leerlingen.filter(l=>{
    if(l.lid===false) return false;
    if(placed.has(l.id)) return false;
    if((l.status||'aanwezig')==='afwezig') return false;
    if((l.status||'aanwezig')==='niet-in-klas'&&!G.settings.toonNietInKlas) return false;
    return true;
  });
  strip.innerHTML='';
  if(!free.length){strip.innerHTML+='<span class="strip-empty">Iedereen heeft gekozen</span>';return;}
  free.forEach(l=>{
    const chip=makeChip(l,null,null);
    if((l.status||'aanwezig')==='niet-in-klas') chip.style.opacity='0.45';
    strip.appendChild(chip);
  });
  const sb=document.getElementById('status-quick-bar');
  if(sb) sb.style.display=G.settings.toonStatusBalk?'flex':'none';
}

function renderGrid(){
  const grid=document.getElementById('hoeken-grid');
  const k=getKlas(),b=getActiveBord();
  const hoeken=getBordHoeken(b,k);
  const cols=G.settings.cols||3;
  const rows=Math.ceil(hoeken.length/cols)||1;
  grid.style.gridTemplateColumns=`repeat(${cols},1fr)`;
  // Cap: max 140px per rij, shrink bij veel hoeken
  const maxH=Math.min(140,Math.max(90,Math.floor((window.innerHeight-100)/rows)));
  grid.style.gridTemplateRows=`repeat(${rows},${maxH}px)`;
  grid.style.alignContent='start';
  grid.innerHTML='';
  hoeken.forEach(h=>grid.appendChild(makeHoekCard(h)));
}

function makeHoekCard(hoek){
  const k=getKlas(),b=getActiveBord();
  // Filter: alleen bestaande leerlingen die lid zijn van de klas
  const rawKids=b.plaatsingen[hoek.id]||[];
  const kids=rawKids.filter(p=>{
    const ll=k.leerlingen.find(x=>x.id===p.leerlingId);
    return ll&&ll.lid!==false;
  });
  // Sync: verwijder ongeldige plaatsingen uit data
  if(kids.length!==rawKids.length){
    b.plaatsingen[hoek.id]=kids;
  }
  const full=kids.length>=hoek.maxKinderen;
  const foto=getFoto(hoek.fotoId,k);
  const card=document.createElement('div');
  card.className='hoek-card'+(full?' full':'');
  card.dataset.hoekId=hoek.id;
  const hi=document.createElement('div');hi.className='hi';
  if(foto){const img=document.createElement('img');img.src=foto;hi.appendChild(img);}
  else hi.innerHTML='<div class="hi-empty"><div class="hi-empty-bar"></div><div class="hi-empty-bar" style="width:26px;margin-top:4px"></div></div>';
  // hi-label removed: naam already shown in right panel
  card.appendChild(hi);
  const hk=document.createElement('div');hk.className='hk';
  // Naam boven
  const hkh=document.createElement('div');hkh.className='hk-head';
  const nm=document.createElement('div');nm.className='hk-name';nm.textContent=hoek.naam;
  hkh.append(nm);hk.appendChild(hkh);
  // Capacity slots: 1 cirkel per plek, picto erin als bezet
  const ke=document.createElement('div');ke.className='cap-slots';
  for(let _i=0;_i<hoek.maxKinderen;_i++){
    const slot=document.createElement('div');slot.className='cap-slot';
    if(_i<kids.length){
      const pp=kids[_i];const ll=k.leerlingen.find(x=>x.id===pp.leerlingId);
      if(ll){
        // Gebruik echte chip zodat slepen werkt
        slot.classList.add('filled');
        slot.style.cssText='width:auto;height:auto;border:none;background:transparent;overflow:visible;border-radius:0;flex-shrink:0';
        const ch=makeChip(ll,hoek.id,pp);
        slot.appendChild(ch);
      }
    } else {
      // Lege slot — highlight via document pointermove (zie setupDrag)
      slot.dataset.emptySlot='1';
      slot.dataset.hoekId=hoek.id;
    }
    ke.appendChild(slot);
  }
  // Grey ghost slots for today's planned leerlingen
  const today=new Date().getDay();
  const dagIdx=today>=1&&today<=5?today-1:-1;
  if(dagIdx>=0&&b.werkplaatsSlots&&b.werkplaatsSlots[hoek.id]){
    const slotIds=b.werkplaatsSlots[hoek.id][dagIdx]||[];
    const placedIds=new Set(kids.map(p=>p.leerlingId));
    slotIds.forEach(function(lid){
      if(placedIds.has(lid)) return;
      const ll=k.leerlingen.find(function(x){return x.id===lid;});
      if(ll) ke.appendChild(makeGhostChip(ll,hoek.id));
    });
  }
  hk.appendChild(ke);card.appendChild(hk);
  return card;
}

function makeChip(l,hoekId,pl){
  const chip=document.createElement('div');
  chip.className='picto-chip';chip.dataset.leerlingId=l.id;chip.dataset.hoekId=hoekId||'';
  const pa=document.createElement('div');pa.className='pa';pa.style.background=l.kleur;
  if(l.image){pa.style.backgroundImage=`url(${l.image})`;pa.style.backgroundSize='cover';pa.style.backgroundPosition='center';}
  else{pa.textContent=l.naam.charAt(0).toUpperCase();}
  if(pl&&pl.locked&&G.settings.timerEnabled){
    const total=G.settings.timerDuur*60000,elapsed=Date.now()-pl.startTime;
    const pct=Math.max(0,(total-elapsed)/total),r=25,c=2*Math.PI*r;
    const ring=document.createElement('div');ring.className='timer-ring';
    ring.innerHTML=`<svg viewBox="0 0 56 56"><circle cx="28" cy="28" r="${r}" stroke-dasharray="${c*pct} ${c}"/></svg>`;
    pa.appendChild(ring);
  }
  if(G.settings.diceVisible&&hoekId){const cnt=weekCount(l.id,hoekId);if(cnt>0){const d=document.createElement('div');d.className='dice-b';d.textContent=cnt;pa.appendChild(d);}}
  if(pl&&pl.locked){
    const lk=document.createElement('div');lk.className='lock-b';pa.appendChild(lk);
    // Override: hidden long-press (2s) on the chip - not visible to children
    let _ovTimer=null;
    chip.addEventListener('touchstart',e=>{_ovTimer=setTimeout(()=>{e.stopPropagation();triggerOverride(l,hoekId,pl);},2000);},{passive:true});
    chip.addEventListener('touchend',()=>{clearTimeout(_ovTimer);},{passive:true});
    chip.addEventListener('touchmove',()=>{clearTimeout(_ovTimer);},{passive:true});
    // Mouse fallback for desktop (right-click)
    chip.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();triggerOverride(l,hoekId,pl);});
  }
  chip.appendChild(pa);
  const pn=document.createElement('div');pn.className='pname';pn.textContent=l.naam;chip.appendChild(pn);
  setupDrag(chip,l,hoekId,pl);
  return chip;
}

// ══════════════════════════════════════════════════════════
// DRAG
// ══════════════════════════════════════════════════════════
let activeDrags={};

function makeGhostChip(ll,hoekId){
  var chip=document.createElement('div');
  chip.className='picto-chip ghost-chip';
  chip.title=ll.naam+' is vandaag ingepland voor de werkplaats. Sleep je picto hierheen!';
  var pa=document.createElement('div');pa.className='pa';
  pa.style.background=ll.kleur+'44';
  pa.style.border='2.5px dashed '+ll.kleur;
  if(ll.image){pa.style.backgroundImage='url('+ll.image+')';pa.style.backgroundSize='cover';pa.style.backgroundPosition='center';pa.style.opacity='0.45';}
  else{pa.textContent=ll.naam.charAt(0).toUpperCase();pa.style.color=ll.kleur;pa.style.fontWeight='800';}
  var pn=document.createElement('div');pn.className='pname';pn.style.opacity='0.5';pn.textContent=ll.naam;
  chip.appendChild(pa);chip.appendChild(pn);
  // Werkplaats ghost: pointer-based drag target (via .hoek-card in pointerup)
  // Visuele feedback bij hover tijdens drag
  chip.addEventListener('pointerenter',function(){
    if(Object.keys(activeDrags).length>0){chip.style.transform='scale(1.08)';chip.style.boxShadow='0 0 0 3px '+ll.kleur;}
  });
  chip.addEventListener('pointerleave',function(){chip.style.transform='';chip.style.boxShadow='';});
  return chip;
}

function setupDrag(chip,l,hoekId,pl){
  chip.addEventListener('pointerdown',e=>{
    if(Object.keys(activeDrags).length>=2) return;
    // Timer: als ingeschakeld en kind is nog niet vrij, blokkeer slepen
    if(pl&&pl.locked&&G.settings.timerEnabled){
      const rem=Math.ceil(Math.max(0,G.settings.timerDuur*60000-(Date.now()-pl.startTime))/60000);
      toast(`${l.naam} – nog ${rem} min`);return;
    }
    e.preventDefault();chip.setPointerCapture(e.pointerId);
    const g=document.createElement('div');
    g.style.cssText='position:fixed;pointer-events:none;z-index:9999;transform:translate(-50%,-50%) scale(1.1) rotate(2deg);';g.dataset.dragGhost='1';
    g.innerHTML=`<div style="display:flex;flex-direction:column;align-items:center;gap:2px">
      <div style="width:60px;height:60px;border-radius:50%;background:${l.kleur};border:2.5px solid #fff;box-shadow:0 3px 14px rgba(0,0,0,.2);display:flex;align-items:center;justify-content:center;font-size:1.3rem;font-weight:800;color:#fff;overflow:hidden;${l.image?`background-image:url(${l.image});background-size:cover;background-position:center;`:''}">
        ${l.image?'':l.naam.charAt(0).toUpperCase()}</div>
      <div style="font-size:.6rem;font-weight:700;color:var(--text)">${l.naam}</div></div>`;
    g.style.left=e.clientX+'px';g.style.top=e.clientY+'px';
    document.body.appendChild(g);chip.classList.add('dragging');
    activeDrags[e.pointerId]={leerlingId:l.id,fromHoekId:hoekId,ghost:g,chip};
  });
  chip.addEventListener('pointermove',e=>{
    const d=activeDrags[e.pointerId];if(!d) return;e.preventDefault();
    d.ghost.style.left=e.clientX+'px';d.ghost.style.top=e.clientY+'px';
    document.querySelectorAll('.hoek-card').forEach(c=>c.classList.remove('drag-over'));
    document.querySelectorAll('.cap-slot').forEach(s=>s.classList.remove('active'));
    const _under=document.elementFromPoint(e.clientX,e.clientY);
    const _hc=_under&&_under.closest('.hoek-card');if(_hc) _hc.classList.add('drag-over');
    const _cs=_under&&_under.closest('.cap-slot:not(.filled)');if(_cs) _cs.classList.add('active');
    // Strip highlight
    const _strip=document.getElementById('children-strip');
    if(_strip){
      const _sr=_strip.getBoundingClientRect();
      const _overStrip=e.clientX>=_sr.left&&e.clientX<=_sr.right&&e.clientY>=_sr.top&&e.clientY<=_sr.bottom;
      _strip.classList.toggle('drag-over-strip',_overStrip&&!!d.fromHoekId);
    }
  });
  chip.addEventListener('pointerup',e=>{
    const d=activeDrags[e.pointerId];if(!d) return;
    // 1. Bepaal drop-doel VOOR DOM-wijzigingen
    const _uel=document.elementFromPoint(e.clientX,e.clientY);
    const _uhc=_uel&&_uel.closest('.hoek-card');
    const _strip=document.getElementById('children-strip');
    const _sr=_strip?_strip.getBoundingClientRect():null;
    const _onStrip=_sr&&e.clientX>=_sr.left&&e.clientX<=_sr.right&&e.clientY>=_sr.top&&e.clientY<=_sr.bottom;
    const _dropHoekId=_uhc?_uhc.dataset.hoekId:null;
    const _fromHoekId=d.fromHoekId;
    const _leerlingId=d.leerlingId;
    // 2. Ruim drag-state op
    d.ghost.remove();
    d.chip.classList.remove('dragging');
    try{chip.releasePointerCapture(e.pointerId);}catch(ex){}
    delete activeDrags[e.pointerId];
    document.querySelectorAll('.hoek-card').forEach(c=>c.classList.remove('drag-over'));
    document.querySelectorAll('.cap-slot').forEach(s=>s.classList.remove('active'));
    if(_strip) _strip.classList.remove('drag-over-strip');
    // 3. Pas data aan in volgende animatieframe zodat DOM stabiel is
    requestAnimationFrame(()=>{
      if(_onStrip&&_fromHoekId){
        removeFromHoek(_leerlingId,_fromHoekId);
      } else if(_dropHoekId){
        place(_leerlingId,_fromHoekId,_dropHoekId);
      } else if(_fromHoekId){
        removeFromHoek(_leerlingId,_fromHoekId);
      }
    });
  });
  chip.addEventListener('pointercancel',e=>{
    const d=activeDrags[e.pointerId];if(!d) return;
    d.ghost.remove();
    d.chip.classList.remove('dragging');
    try{chip.releasePointerCapture(e.pointerId);}catch(ex){}
    delete activeDrags[e.pointerId];
    document.querySelectorAll('.hoek-card').forEach(c=>c.classList.remove('drag-over'));
    document.querySelectorAll('.cap-slot').forEach(s=>s.classList.remove('active'));
    const _pcs=document.getElementById('children-strip');if(_pcs) _pcs.classList.remove('drag-over-strip');
  });
}
function place(lid,fromId,toId){
  if(fromId===toId) return;const k=getKlas();const b=getActiveBord();
  const hoek=k.hoekLib.find(h=>h.id===toId);if(!hoek) return;
  // Verwijder uit huidige locatie (ook als fromId null is, zodat geen duplicaten)
  if(fromId) b.plaatsingen[fromId]=(b.plaatsingen[fromId]||[]).filter(p=>p.leerlingId!==lid);
  else Object.keys(b.plaatsingen).forEach(function(hid){
    b.plaatsingen[hid]=(b.plaatsingen[hid]||[]).filter(p=>p.leerlingId!==lid);
  });
  const kids=b.plaatsingen[toId]||[];
  if(kids.length>=hoek.maxKinderen){toast(`${hoek.naam} is vol`);renderBoard();return;}
  const locked=G.settings.timerEnabled;
  b.plaatsingen[toId]=[...kids,{leerlingId:lid,startTime:Date.now(),locked}];
  if(locked){const dur=G.settings.timerDuur*60000;setTimeout(()=>{const p=(b.plaatsingen[toId]||[]).find(p=>p.leerlingId===lid);if(p){p.locked=false;save();renderBoard();}},dur);}
  save();renderBoard();
  const l=k.leerlingen.find(x=>x.id===lid);toast(`${l.naam} → ${hoek.naam}`);
}
function removeFromHoek(lid,hoekId){
  const b=getActiveBord();b.plaatsingen[hoekId]=(b.plaatsingen[hoekId]||[]).filter(p=>p.leerlingId!==lid);save();renderBoard();
}

function openKlasModal(klas){
  const ie=!!klas;
  document.getElementById('modal-title').textContent=ie?'Klas bewerken':'Nieuwe klas';
  document.getElementById('modal-body').innerHTML=`
    <div class="fg"><label>Naam klas</label><input type="text" id="kl-naam" value="${klas?klas.naam:''}" placeholder="Bv. Groep 1/2A"></div>
    ${!ie&&G.klassen.length>0?`
    <div class="fg"><label>Hoeken kopiëren van andere klas (optioneel)</label>

        ${G.klassen.map(k=>`<option value="${k.id}">${k.naam}</option>`).join('')}
      </select>
      <p class="hint">Kopieer alle hoeken inclusief gekoppelde foto's.</p>
    </div>`:''}`;
  renderModalBtns([
    {label:'Annuleer',cls:'btn-ghost',action:closeModal},
    {label:'Opslaan',cls:'btn-primary',action:()=>saveKlas(klas?klas.id:null)}]);

function saveKlas(editId){
  const naam=document.getElementById('kl-naam').value.trim();
  if(!naam){toast('Naam vereist');return;}
  if(editId){
    G.klassen.find(k=>k.id===editId).naam=naam;
  } else {
    const k=newKlas(naam);
    // optionally copy hoeken from another klas
    const copyFrom=document.getElementById('kl-copy-from')?.value;
    if(copyFrom){
      const src=G.klassen.find(x=>x.id===copyFrom);
      if(src){
        // Deep copy fotoLib entries and hoekLib with remapped ids
        const fotoMap={};
        src.fotoLib.forEach(f=>{const nid='f'+uid();fotoMap[f.id]=nid;k.fotoLib.push({id:nid,naam:f.naam,data:f.data});});
        k.hoekLib=src.hoekLib.map(h=>({id:'hl'+uid(),naam:h.naam,maxKinderen:h.maxKinderen,fotoId:h.fotoId?fotoMap[h.fotoId]||null:null}));
        // Set up first board with all copied hoeken
        k.borden[0].hoekLibIds=k.hoekLib.map(h=>h.id);
        k.hoekLib.forEach(h=>k.borden[0].plaatsingen[h.id]=[]);
      }
    }
    G.klassen.push(k);G.activeKlasId=k.id;
  }
  save();closeModal();renderKlassenPanel();
  document.getElementById('admin-bar-title').textContent='Beheer – '+getKlas().naam;
  renderBordenPanel();renderHoekenPanel();renderLeerlingenPanel();renderFotosPanel();
  toast('Klas opgeslagen');
}

function deleteKlas(id){
  if(G.klassen.length<=1){toast('Minimaal 1 klas vereist');return;}
  openModal('Klas verwijderen?',`<p style="font-size:.85rem">Klas en alle bijbehorende data wordt verwijderd.</p>`,[
    {label:'Annuleer',cls:'btn-ghost',action:closeModal},
    {label:'Verwijderen',cls:'btn-danger',action:()=>{
      G.klassen=G.klassen.filter(k=>k.id!==id);
      if(G.activeKlasId===id) G.activeKlasId=G.klassen[0].id;
      save();closeModal();renderKlassenPanel();toast('Klas verwijderd');
    }}]);
}

function renderCopyHoekenList(){

    return `<label class="kpick-item">

      ${foto?`<img src="${foto.data}" style="width:40px;height:26px;object-fit:cover;border-radius:4px;">`:'<div style="width:40px;height:26px;background:var(--border);border-radius:4px;"></div>'}

    </label>`;

function doCopyHoeken(){
  const selId=document.getElementById('copy-klas-sel')?.value;
  const src=G.klassen.find(x=>x.id===selId);
  if(!src){closeModal();return;}
  const k=getKlas();
  const checked=[...document.querySelectorAll('.kpick-check:checked')].map(el=>el.dataset.hid);
  const fotoMap={};
  let count=0;
  checked.forEach(hid=>{
    const sh=src.hoekLib.find(h=>h.id===hid);if(!sh) return;
    // Copy foto if not already present (match by data)
    let newFotoId=null;
    if(sh.fotoId){
      const sf=src.fotoLib.find(f=>f.id===sh.fotoId);
      if(sf){
        // Check if klas already has this foto by data
        const existing=k.fotoLib.find(f=>f.data===sf.data);
        if(existing){newFotoId=existing.id;}
        else{
          if(!fotoMap[sf.id]){const nid='f'+uid();fotoMap[sf.id]=nid;k.fotoLib.push({id:nid,naam:sf.naam,data:sf.data});}
          newFotoId=fotoMap[sf.id];
        }
      }
    }
    const nid='hl'+uid();
    k.hoekLib.push({id:nid,naam:sh.naam,maxKinderen:sh.maxKinderen,fotoId:newFotoId});
    // Add to active board plaatsingen
    const b=getActiveBord();
    b.plaatsingen[nid]=[];
    count++;
  });
  save();closeModal();renderHoekenPanel();renderBordenPanel();
  toast(`${count} hoek${count!==1?'en':''} gekopieerd`);
}

function uploadHoekFoto(input){
  if(!input.files[0]) return;const k=getKlas();

    if(prev) prev.innerHTML=`<img src="${e.target.result}" style="width:100%;max-height:80px;object-fit:contain;border-radius:7px;background:var(--faint)">`;

      item.innerHTML=`<img src="${e.target.result}"><div class="pil">${naam}</div>`;item.onclick=()=>selHoekFoto(id);
      document.querySelectorAll('#hflib .photo-item').forEach(x=>x.classList.remove('selected'));libEl.appendChild(item);}

function openBulkImportModal(){
  document.getElementById('modal-title').textContent='Picto\'s importeren';
  document.getElementById('modal-body').innerHTML=`
    <p style="font-size:.84rem;margin-bottom:12px">Selecteer meerdere afbeeldingsbestanden. De <strong>bestandsnaam</strong> (zonder extensie) wordt vergeleken met de naam van een leerling. Bij een overeenkomst wordt het picto toegevoegd.</p>
    <p style="font-size:.84rem;color:var(--sub);margin-bottom:12px">Tip: noem je bestanden precies zoals de leerlingnamen, bv. <em>Benjamin.jpg</em></p>
    <label class="uarea">Bestanden kiezen<input type="file" accept="image/*" multiple onchange="doBulkImport(this)"></label>
    <div id="bulk-result" style="margin-top:12px;font-size:.82rem"></div>`;
  renderModalBtns([{label:'Sluiten',cls:'btn-ghost',action:closeModal}]);
  openModalEl();
}
function doBulkImport(input){
  const k=getKlas();const files=Array.from(input.files);let matched=0,unmatched=[];
  let done=0;
  files.forEach(function(file){
    const baseName=file.name.replace(/\.[^.]+$/,'').trim().toLowerCase();
    const r=new FileReader();
    r.onload=function(e){
      done++;
      const ll=k.leerlingen.find(function(l){return l.naam.trim().toLowerCase()===baseName;});
      if(ll){ll.image=e.target.result;ll._c=false;matched++;}
      else{unmatched.push(file.name);}
      if(done===files.length){
        save();renderLeerlingenPanel();
        var msg='<span style="color:var(--success)">✓ '+matched+' picto(s) gekoppeld</span>';
        if(unmatched.length) msg+='<br><span style="color:var(--danger)">Niet gevonden: '+unmatched.join(', ')+'</span>';
        var el=document.getElementById('bulk-result');if(el) el.innerHTML=msg;
        if(matched) toast(matched+' picto(s) gekoppeld');
      }
    };r.readAsDataURL(file);
  });
}

function renderFotoGrid(filterCat){
  filterCat=filterCat||'alle';

  list.forEach(function(f){

function uploadArchief(input){

  G.settings.timerDuur=parseInt(document.getElementById('set-dur')?.textContent||G.settings.timerDuur);

  const uniq=new Set(k.weekData.flatMap(d=>Object.values(d.plaatsingen).flat().map(x=>x.leerlingId))).size;

  const el=document.getElementById('ds-inner');
  if(!k.weekData.length){el.innerHTML='<p class="hint">Nog geen data.</p>';return;}
  const last=k.weekData[k.weekData.length-1];
  const bord=k.borden.find(b=>b.id===last.bordId)||getActiveBord();
  const hoeken=getBordHoeken(bord,k);
  k.leerlingen.forEach(l=>{
    const row=document.createElement('div');row.className='dsr';
    const bez=hoeken.filter(h=>(last.plaatsingen[h.id]||[]).some(p=>p.leerlingId===l.id));
    row.innerHTML=`<div class="dc">${l.naam}</div>
      <div style="flex:1;display:flex;flex-wrap:wrap;gap:4px">${bez.map(h=>`<span class="dtag">${h.naam}</span>`).join('')||'<span class="hint">Niet ingepland</span>'}</div>`;

  });
}

// ── SUGGESTIES ──
function renderSuggesties(){
  const k=getKlas();
  const p=document.getElementById('panel-suggesties');
  p.innerHTML=`<div class="stitle">Suggesties – ${k.naam}</div><div id="sug-inner"></div>`;
  const c=document.getElementById('sug-inner');
  if(k.weekData.length<2){c.innerHTML='<p class="hint">Speel minimaal 2 dagen voor suggesties.</p>';return;}
  const suggs=[];
  k.leerlingen.forEach(l=>{
    const cnt={};
    k.weekData.forEach(d=>{
      const brd=k.borden.find(b=>b.id===d.bordId)||getActiveBord();
      getBordHoeken(brd,k).forEach(h=>{if((d.plaatsingen[h.id]||[]).some(p=>p.leerlingId===l.id)) cnt[h.id]=(cnt[h.id]||0)+1;});
    });
    const srt=Object.entries(cnt).sort((a,b)=>b[1]-a[1]);
    if(srt.length&&srt[0][1]>=2){const fav=k.hoekLib.find(h=>h.id===srt[0][0]);if(fav) suggs.push(`<strong>${l.naam}</strong> kiest al ${srt[0][1]}× de ${fav.naam}.`);}
  });
  const tog={};
  k.weekData.forEach(d=>{
    const brd=k.borden.find(b=>b.id===d.bordId)||getActiveBord();
    getBordHoeken(brd,k).forEach(h=>{
      const kids=(d.plaatsingen[h.id]||[]).map(p=>p.leerlingId);
      for(let i=0;i<kids.length;i++) for(let j=i+1;j<kids.length;j++){const key=[kids[i],kids[j]].sort().join('-');tog[key]=(tog[key]||0)+1;}
    });
  });
  let nc=0;
  for(let i=0;i<k.leerlingen.length&&nc<3;i++) for(let j=i+1;j<k.leerlingen.length;j++){
    const key=[k.leerlingen[i].id,k.leerlingen[j].id].sort().join('-');
    if(!tog[key]){suggs.push(`<strong>${k.leerlingen[i].naam}</strong> en <strong>${k.leerlingen[j].naam}</strong> speelden nog nooit samen.`);nc++;}
  }
  if(!suggs.length){c.innerHTML='<p style="color:var(--success);font-weight:600;font-size:.85rem">Alles ziet er goed uit.</p>';return;}
  suggs.forEach(s=>{const d=document.createElement('div');d.className='sugg';d.innerHTML=s;c.appendChild(d);});
}

function doAutoGroepjes(){
  var k=getKlas();
  if(!k.groepjes) k.groepjes=[];
  var n=parseInt(document.getElementById('ag-n')?.textContent||4);
  var basis=document.getElementById('ag-basis')?.value||'random';
  var leerlingen=k.leerlingen.filter(function(l){return (l.status||'aanwezig')==='aanwezig';});
  if(!leerlingen.length){toast('Geen aanwezige leerlingen');closeModal();return;}
  // Sort by werkplaats progress if requested
  if(basis==='werkplaats'){
    leerlingen=leerlingen.slice().sort(function(a,b){
      var pa=getWerkplaatsVoortgangPct(a.id);var pb=getWerkplaatsVoortgangPct(b.id);
      return pa-pb; // mix low+high by interleaving below
    });
    // Interleave: [ lowest, highest, 2nd lowest, 2nd highest, ... ]
    var sorted=leerlingen.slice();
    leerlingen=[];
    var lo=0,hi=sorted.length-1;
    while(lo<=hi){
      if(lo===hi){leerlingen.push(sorted[lo]);break;}
      leerlingen.push(sorted[lo]);leerlingen.push(sorted[hi]);
      lo++;hi--;
    }
  } else {
    // Fisher-Yates shuffle
    leerlingen=leerlingen.slice();
    for(var i=leerlingen.length-1;i>0;i--){var j=Math.floor(Math.random()*(i+1));var tmp=leerlingen[i];leerlingen[i]=leerlingen[j];leerlingen[j]=tmp;}
  }
  var groepNamen=['Rood','Blauw','Groen','Geel','Paars','Oranje','Roze','Wit','Zwart','Bruin'];
  var newGroepen=[];
  for(var g=0;g<n;g++){
    var ids=[];
    for(var i=g;i<leerlingen.length;i+=n) ids.push(leerlingen[i].id);
    newGroepen.push({id:'g'+uid(),naam:'Groep '+(groepNamen[g]||g+1),leerlingIds:ids,aangemaakt:Date.now()});
  }
  k.groepjes=k.groepjes.concat(newGroepen);
  save();closeModal();renderGroepjesPanel();
  toast(n+' groepjes aangemaakt ('+newGroepen.reduce(function(t,g){return t+g.leerlingIds.length;},0)+' leerlingen)');
}

// Taken aanmaken, leerlingen kiezen op welke dag ze die doen

var WP_DAGKLEUREN=['#e74c3c','#e67e22','#3498db','#2ecc71','#9b59b6'];
var WP_DAGNAMEN=['Maandag','Dinsdag','Woensdag','Donderdag','Vrijdag'];

function getWerkplaatsTaken(){var k=getKlas();if(!k.werkplaatsTaken)k.werkplaatsTaken=[];return k.werkplaatsTaken;}

function getWerkplaatsVoortgangPct(leerlingId){
  var taken=getWerkplaatsTaken();
  if(!taken.length) return 0;
  var gedaan=taken.filter(function(t){
    return (t.voortgang||[]).find(function(v){return v.leerlingId===leerlingId&&v.status==='klaar';});
  }).length;
  return Math.round(gedaan/taken.length*100);
}

  var k=getKlas();

  } else {
    html+='<div style="display:flex;flex-direction:column;gap:10px">';
    taken.forEach(function(taak,ti){
      var totLL=k.leerlingen.filter(function(l){return (l.status||'aanwezig')==='aanwezig';}).length;
      var klaar=(taak.voortgang||[]).filter(function(v){return v.status==='klaar';}).length;
      var bezig=(taak.voortgang||[]).filter(function(v){return v.status==='bezig';}).length;
      var pct=totLL?Math.round(klaar/totLL*100):0;
      html+='<div style="background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px">';
      html+='<div style="display:flex;align-items:flex-start;gap:10px">';

      html+='<div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">';
      html+='<strong style="font-size:.88rem">'+escHtml(taak.naam)+'</strong>';
      if(taak.leerlijnen&&taak.leerlijnen.length){
        html+='<span style="background:var(--primary)22;color:var(--primary);font-size:.7rem;font-weight:700;padding:2px 8px;border-radius:10px">'+escHtml(taak.leerlijnen.join(', '))+'</span>';
      }
      html+='</div>';
      if(taak.omschrijving) html+='<p style="font-size:.79rem;color:var(--sub);margin-bottom:8px">'+escHtml(taak.omschrijving)+'</p>';
      // Progress bar
      html+='<div style="background:var(--faint);border-radius:4px;height:6px;margin-bottom:8px"><div style="background:var(--success);height:6px;border-radius:4px;width:'+pct+'%;transition:width .3s"></div></div>';
      html+='<div style="font-size:.74rem;color:var(--sub)">'+klaar+'/'+totLL+' klaar · '+bezig+' bezig</div>';
      html+='</div>';
      html+='<div style="display:flex;gap:4px;flex-shrink:0">';

      html+='</div></div></div>';
    });
    html+='</div>';

function getHuidigeWeek(){
  var now=new Date();
  var mon=new Date(now);
  mon.setDate(now.getDate()-((now.getDay()+6)%7));
  return mon.toISOString().substring(0,10);
}

function getOfMaakWeek(weekKey){
  var k=getKlas();
  if(!k.weekplannerWeken) k.weekplannerWeken=[];
  var week=k.weekplannerWeken.find(function(w){return w.weekKey===weekKey;});
  if(!week){
    week={weekKey,dagen:[
      {dag:'Maandag',activiteiten:[]},
      {dag:'Dinsdag',activiteiten:[]},
      {dag:'Woensdag',activiteiten:[]},
      {dag:'Donderdag',activiteiten:[]},
      {dag:'Vrijdag',activiteiten:[]},
    ]};
    k.weekplannerWeken.push(week);
  }
  return week;
}

  var k=getKlas();
  if(!k.weekplannerWeken) k.weekplannerWeken=[];
  var p=document.getElementById('panel-weekplanner');
  // Week navigation
  var huidig=getHuidigeWeek();
  if(!window._wpWeek) window._wpWeek=huidig;
  var week=getOfMaakWeek(window._wpWeek);
  var weekDt=new Date(window._wpWeek+'T00:00:00');
  var weekEnd=new Date(weekDt);weekEnd.setDate(weekDt.getDate()+4);
  var fmt=function(d){return d.getDate()+'/'+(d.getMonth()+1);};
  var html='<div class="stitle">Weekplanner – '+k.naam+'</div>';
  html+='<div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;flex-wrap:wrap">';
  html+='<button class="btn btn-ghost btn-sm" onclick="wpNavWeek(-1)">← Vorige week</button>';
  html+='<strong style="font-size:.88rem">Week van '+fmt(weekDt)+' t/m '+fmt(weekEnd)+'</strong>';
  html+='<button class="btn btn-ghost btn-sm" onclick="wpNavWeek(1)">Volgende week →</button>';
  if(window._wpWeek!==huidig) html+='<button class="btn btn-ghost btn-sm" onclick="wpGoHeden()">Vandaag</button>';
  html+='</div>';
  html+='<div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(160px,1fr));gap:12px">';
  week.dagen.forEach(function(dag,di){
    var dagClr=WP_DAGKLEUREN[di];
    html+='<div style="background:var(--surface);border:2px solid '+dagClr+'44;border-radius:var(--radius);overflow:hidden">';
    html+='<div style="background:'+dagClr+';color:#fff;padding:8px 12px;font-weight:700;font-size:.82rem;display:flex;align-items:center;justify-content:space-between">';
    html+=dag.dag;
    html+='<button style="background:rgba(255,255,255,.25);border:none;border-radius:4px;color:#fff;cursor:pointer;padding:2px 7px;font-size:.75rem;font-weight:700" data-wk="'+window._wpWeek+'" data-di="'+di+'" onclick="openWpActiviteitModal(this.dataset.wk,parseInt(this.dataset.di),null)">+</button>';
    html+='</div>';

    if(!dag.activiteiten.length){
      html+='<p style="font-size:.73rem;color:var(--sub);text-align:center;padding:10px 0">Klik + voor activiteit</p>';
    }
    dag.activiteiten.forEach(function(act,ai){
      var tagKlr=act.tag==='werkplaats'?'var(--primary)':act.tag==='les'?'var(--success)':act.tag==='spel'?'#e67e22':'var(--sub)';
      html+='<div style="background:var(--faint);border-radius:7px;padding:7px 9px;margin-bottom:6px;border-left:3px solid '+tagKlr+'">';
      html+='<div style="display:flex;align-items:flex-start;justify-content:space-between;gap:4px">';
      html+='<strong style="font-size:.78rem;line-height:1.3">'+escHtml(act.naam)+'</strong>';
      html+='<div style="display:flex;gap:2px;flex-shrink:0">';
      html+='<button style="background:none;border:none;cursor:pointer;font-size:.7rem;color:var(--sub)" data-wk="'+window._wpWeek+'" data-di="'+di+'" data-ai="'+ai+'" onclick="openWpActiviteitModal(this.dataset.wk,parseInt(this.dataset.di),parseInt(this.dataset.ai))">✎</button>';
      html+='<button style="background:none;border:none;cursor:pointer;font-size:.7rem;color:var(--danger)" data-wk="'+window._wpWeek+'" data-di="'+di+'" data-ai="'+ai+'" onclick="deleteWpActiviteit(this.dataset.wk,parseInt(this.dataset.di),parseInt(this.dataset.ai))">✕</button>';
      html+='</div></div>';
      if(act.tijdslot) html+='<div style="font-size:.7rem;color:var(--sub)">⏰ '+escHtml(act.tijdslot)+'</div>';
      if(act.opmerking) html+='<div style="font-size:.7rem;color:var(--sub);margin-top:2px">💬 '+escHtml(act.opmerking)+'</div>';
      if(act.leerlijnen&&act.leerlijnen.length) html+='<div style="font-size:.68rem;color:var(--primary);margin-top:3px">📚 '+escHtml(act.leerlijnen.join(', '))+'</div>';
      if(act.werkplaatsTaakId){
        var wt=k.werkplaatsTaken?k.werkplaatsTaken.find(function(t){return t.id===act.werkplaatsTaakId;}):null;
        if(wt){
          var gedaan=(wt.voortgang||[]).filter(function(v){return v.dag===di&&(v.status==='bezig'||v.status==='klaar');}).length;
          html+='<div style="font-size:.68rem;color:var(--primary);margin-top:3px">🔨 '+escHtml(wt.naam)+' ('+gedaan+' lln actief)</div>';

function wpNavWeek(delta){
  var d=new Date(window._wpWeek+'T00:00:00');
  d.setDate(d.getDate()+delta*7);
  window._wpWeek=d.toISOString().substring(0,10);
  renderWeekplannerPanel();
}
function wpGoHeden(){window._wpWeek=getHuidigeWeek();renderWeekplannerPanel();}

    '</select></div>'+
    '<div class="fg"><label>Tijdslot (optioneel)</label><input type="text" id="wp-act-tijdslot" value="'+(act?escHtml(act.tijdslot||''):'')+'" placeholder="Bv. 9:00 – 10:00"></div>'+
    '<div class="fg"><label>Koppel aan werkje</label><select id="wp-act-wt" style="width:100%;font-family:inherit;font-size:.85rem;border:1.5px solid var(--border);border-radius:8px;padding:7px 11px;background:#fff">'+taakOpties+'</select></div>'+
    '<div class="fg"><label>Leerlijnen (komma-gescheiden)</label><input type="text" id="wp-act-ll" value="'+(act&&act.leerlijnen?act.leerlijnen.join(', '):'')+'" placeholder="Bv. Taal, Rekenen"></div>'+
    '<div class="fg"><label>Opmerking</label><textarea id="wp-act-opmerking" style="width:100%;font-family:inherit;font-size:.85rem;border:1.5px solid var(--border);border-radius:8px;padding:8px 11px;min-height:56px;resize:vertical" placeholder="Notitie voor jezelf">'+(act?escHtml(act.opmerking||''):'')+'</textarea></div>';
  renderModalBtns([
    {label:'Annuleer',cls:'btn-ghost',action:closeModal},
    {label:'Opslaan',cls:'btn-primary',action:function(){saveWpActiviteit(weekKey,dagIdx,actIdx);}}
  ]);
  openModalEl();
}

function saveWpActiviteit(weekKey,dagIdx,actIdx){
  var naam=document.getElementById('wp-act-naam').value.trim();
  if(!naam){toast('Naam vereist');return;}
  var k=getKlas();
  var week=getOfMaakWeek(weekKey);
  var dag=week.dagen[dagIdx];
  var tag=document.getElementById('wp-act-tag').value;
  var tijdslot=document.getElementById('wp-act-tijdslot').value.trim();
  var wtId=document.getElementById('wp-act-wt').value||null;
  var llRaw=document.getElementById('wp-act-ll').value;
  var leerlijnen=llRaw?llRaw.split(',').map(function(s){return s.trim();}).filter(Boolean):[];
  var opmerking=document.getElementById('wp-act-opmerking').value.trim();
  var newAct={id:'wa'+uid(),naam,tag,tijdslot,werkplaatsTaakId:wtId,leerlijnen,opmerking,aangemaakt:Date.now()};
  if(actIdx!==null&&actIdx!==undefined){dag.activiteiten[actIdx]=Object.assign({},dag.activiteiten[actIdx],newAct);}
  else{dag.activiteiten.push(newAct);}
  save();closeModal();renderWeekplannerPanel();toast('Activiteit opgeslagen');
}

function deleteWpActiviteit(weekKey,dagIdx,actIdx){
  var week=getOfMaakWeek(weekKey);
  week.dagen[dagIdx].activiteiten.splice(actIdx,1);
  save();renderWeekplannerPanel();toast('Activiteit verwijderd');
}

// OBSERVATIE EXPORT BRIDGE
// Exporteert leerling-voortgang als JSON voor extern observatiesysteem
// AVG: namen worden gehasht als geanonimiseerd=true
// ══════════════════════════════════════════════════════════
function exportObservatieData(geanonimiseerd){
  var k=getKlas();
  var taken=k.werkplaatsTaken||[];
  var weken=k.weekplannerWeken||[];
  var data={
    exportDatum: new Date().toISOString(),
    klasNaam: geanonimiseerd?'[KLAS]':k.naam,
    versie:'1.0',
    leerlingen: k.leerlingen.map(function(l,idx){
      var naam=geanonimiseerd?'Leerling_'+(idx+1):l.naam;
      var werkplaatsVoortgang=taken.map(function(t){
        var v=(t.voortgang||[]).find(function(x){return x.leerlingId===l.id;})||{};
        return {
          taakNaam:t.naam,
          taakId:t.id,
          leerlijnen:t.leerlijnen||[],
          status:v.status||'open',
          dag:v.dag!==null&&v.dag!==undefined?WP_DAGNAMEN[v.dag]:null,
        };
      });
      return {
        id:geanonimiseerd?'ll_'+(idx+1):l.id,
        naam:naam,
        aanwezig:(l.status||'aanwezig')==='aanwezig',
        werkplaatsVoortgang:werkplaatsVoortgang,
        voortgangPct:getWerkplaatsVoortgangPct(l.id),
        groepjes:(k.groepjes||[]).filter(function(g){return g.leerlingIds.includes(l.id);}).map(function(g){return g.naam;}),
      };
    }),
    weekplanner: weken.map(function(w){
      return {
        weekKey:w.weekKey,
        dagen:w.dagen.map(function(d){
          return {
            dag:d.dag,
            activiteiten:d.activiteiten.map(function(a){
              return {naam:a.naam,tag:a.tag,tijdslot:a.tijdslot||null,leerlijnen:a.leerlijnen||[],opmerking:a.opmerking||null,werkplaatsTaakId:a.werkplaatsTaakId||null};
            })
          };
        })
      };
    }),
    werkplaatsTaken: taken.map(function(t){
      return {id:t.id,naam:t.naam,leerlijnen:t.leerlijnen||[],omschrijving:t.omschrijving||''};
    }),
  };
  var blob=new Blob([JSON.stringify(data,null,2)],{type:'application/json'});
  var url=URL.createObjectURL(blob);
  var a=document.createElement('a');
  a.href=url;
  a.download=(geanonimiseerd?'observatie-anoniem':'observatie-'+k.naam.replace(/\s+/g,'_'))+'-'+new Date().toISOString().substring(0,10)+'.json';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
  URL.revokeObjectURL(url);
  toast('Export gedownload ('+(geanonimiseerd?'geanonimiseerd':'met namen')+')');
}

      html+='<div style="font-size:.71rem;font-weight:700;color:'+WP_DAGKLEUREN[di]+';margin-bottom:5px">'+dag+'</div>';
      html+='<select data-hid="'+hoek.id+'" data-di="'+di+'" onchange="wpAddGroepje(this)" style="width:100%;font-size:.7rem;font-family:inherit;border:1px solid var(--border);border-radius:4px;padding:2px;margin-bottom:5px"><option value="">+ groepje</option>';
      k.groepjes.forEach(function(g){html+='<option value="'+g.id+'">'+escHtml(g.naam)+'</option>';});
      html+='</select>';
      html+='<div id="wpslot-'+hoek.id+'-'+di+'" style="display:flex;flex-wrap:wrap;gap:2px">';
      slots.forEach(function(lid){
        var ll=k.leerlingen.find(function(x){return x.id===lid;});if(!ll) return;
        html+='<span style="display:inline-flex;align-items:center;gap:2px;background:'+ll.kleur+'22;border:1px solid '+ll.kleur+';border-radius:10px;padding:1px 5px;font-size:.66rem;font-weight:600">'
          +escHtml(ll.naam)
          +'<button data-hid="'+hoek.id+'" data-di="'+di+'" data-lid="'+lid+'" onclick="wpRemoveLid(this)" style="background:none;border:none;cursor:pointer;color:var(--danger);font-size:.6rem;padding:0 1px">✕</button></span>';
      });
      html+='</div></div>';
    });
    html+='</div></div>';
  });
  openModal('Werkplaats inplannen',html,[
    {label:'Klaar',cls:'btn-primary',action:function(){save();closeModal();renderBoard();}}
  ]);
}

function wpAddGroepje(sel){
  var hid=sel.dataset.hid;var di=parseInt(sel.dataset.di);var gid=sel.value;
  if(!gid) return; sel.value='';
  var k=getKlas();var b=getActiveBord();
  if(!b.werkplaatsSlots) b.werkplaatsSlots={};
  if(!b.werkplaatsSlots[hid]) b.werkplaatsSlots[hid]={};
  if(!b.werkplaatsSlots[hid][di]) b.werkplaatsSlots[hid][di]=[];
  var g=k.groepjes.find(function(x){return x.id===gid;});if(!g) return;
  var cur=b.werkplaatsSlots[hid][di];
  g.leerlingIds.forEach(function(lid){if(!cur.includes(lid)) cur.push(lid);});
  save();
  var cont=document.getElementById('wpslot-'+hid+'-'+di);if(!cont) return;
  cont.innerHTML='';
  cur.forEach(function(lid){
    var ll=k.leerlingen.find(function(x){return x.id===lid;});if(!ll) return;
    var sp=document.createElement('span');
    sp.style.cssText='display:inline-flex;align-items:center;gap:2px;background:'+ll.kleur+'22;border:1px solid '+ll.kleur+';border-radius:10px;padding:1px 5px;font-size:.66rem;font-weight:600';
    sp.textContent=ll.naam;
    var rm=document.createElement('button');
    rm.style.cssText='background:none;border:none;cursor:pointer;color:var(--danger);font-size:.6rem;padding:0 1px';
    rm.textContent='✕';
    rm.onclick=(function(h,d,l){return function(){wpRemoveLidDirect(h,d,l);};})(hid,di,lid);
    sp.appendChild(rm);cont.appendChild(sp);
  });
}

function wpRemoveLid(btn){
  wpRemoveLidDirect(btn.dataset.hid,parseInt(btn.dataset.di),btn.dataset.lid);
  btn.closest('span').remove();
}
function wpRemoveLidDirect(hid,di,lid){
  var b=getActiveBord();
  if(b.werkplaatsSlots&&b.werkplaatsSlots[hid]&&b.werkplaatsSlots[hid][di]){
    b.werkplaatsSlots[hid][di]=b.werkplaatsSlots[hid][di].filter(function(x){return x!==lid;});
    save();
  }
}

function step(id,delta,min,max){
  const el=document.getElementById(id);const v=Math.max(min,Math.min(max,parseInt(el.textContent)+delta));
  el.textContent=v;if(id.startsWith('set-')) saveSett();
}
function selCol(el,gid){
  document.querySelectorAll('#'+gid+' .cswatch').forEach(d=>{d.classList.remove('sel');d.style.borderColor='transparent';});
  el.classList.add('sel');el.style.borderColor='var(--text)';
}
function openModal(title,body,btns){document.getElementById('modal-title').textContent=title;document.getElementById('modal-body').innerHTML=body;renderModalBtns(btns);openModalEl();}
function openModalEl(){document.getElementById('modal-overlay').classList.add('active');}
function renderModalBtns(btns){
  const c=document.getElementById('modal-btns');c.innerHTML='';
  btns.forEach(b=>{const btn=document.createElement('button');btn.className='btn '+b.cls;btn.textContent=b.label;btn.onclick=b.action;c.appendChild(btn);});
}
function closeModal(){document.getElementById('modal-overlay').classList.remove('active');window._sf=null;window._llImg=null;}
document.getElementById('modal-overlay').addEventListener('click',e=>{if(e.target.id==='modal-overlay') closeModal();});

let _tt;
function toast(msg){const el=document.getElementById('toast');el.textContent=msg;el.classList.add('show');clearTimeout(_tt);_tt=setTimeout(()=>el.classList.remove('show'),2800);}

let _pi='';
function openPin(cb,title,sub){
  _pi='';pinCallback=cb;
  document.getElementById('pin-title').textContent=title||'Beheer';
  document.getElementById('pin-sub').textContent=sub||'Voer de PIN in';
  document.getElementById('pin-display').textContent='_ _ _ _';
  document.getElementById('pin-error').textContent='';
  document.getElementById('pin-overlay').classList.add('active');
}
function pinPress(val){
  if(val==='cancel'){document.getElementById('pin-overlay').classList.remove('active');pinCallback=null;_pi='';return;}
  if(val==='back') _pi=_pi.slice(0,-1);
  else{if(_pi.length>=4) return;_pi+=val;}
  const dots=_pi.split('').map(()=>'●').join(' ');const blanks=Array(4-_pi.length).fill('_').join(' ');
  document.getElementById('pin-display').textContent=(dots+(dots&&blanks?' ':'')+blanks)||'_ _ _ _';
  if(_pi.length===4){
    if(_pi===(G.settings.pinCode||DEF_PIN)){
      document.getElementById('pin-overlay').classList.remove('active');_pi='';
      if(pinCallback){pinCallback();pinCallback=null;}
    } else {
      document.getElementById('pin-error').textContent='Onjuiste PIN';
      setTimeout(()=>{_pi='';document.getElementById('pin-display').textContent='_ _ _ _';document.getElementById('pin-error').textContent='';},1000);
    }
  }
}

// auto-unlock
setInterval(()=>{
  const b=getActiveBord();const k=getKlas();if(!b.dagOpen) return;
  let ch=false;
  getBordHoeken(b,k).forEach(h=>{
    (b.plaatsingen[h.id]||[]).forEach(p=>{if(p.locked&&Date.now()-p.startTime>=G.settings.timerDuur*60000){p.locked=false;ch=true;}});
  });
  if(ch){save();renderBoard();}
},15000);

// GROEP 1D INITIALISATION
// ══════════════════════════════════════════════════════════
function initGroep1D(){
  if(G.klassen.find(function(k){return k.naam==='Groep 1D';})) return;
  var k=newKlas('Groep 1D');
  k.thema='groen';
  // Leerlingen
  var colors=['#e74c3c','#e67e22','#f1c40f','#2ecc71','#1abc9c','#3498db','#9b59b6','#e91e63',
    '#ff5722','#00bcd4','#8bc34a','#ff9800','#673ab7','#f44336','#2196f3','#4caf50','#ff5252',
    '#7c4dff','#64dd17','#00e5ff','#ffd740','#ff6d00','#69f0ae','#40c4ff','#ea80fc','#b9f6ca','#80d8ff'];
  GROEP_1D_LL.forEach(function(ll,i){
    var l={id:'ll-1d-'+i,naam:ll.naam,kleur:colors[i%colors.length],image:ll.img,_c:true,status:'aanwezig',lid:true};
    k.leerlingen.push(l);
  });
  // Hoeken
  var hoekNames=['Bouwhoek','Huishoek','Zandtafel','Knutselhoek','Werktafel','Leeshoek','Knutselkast'];
  hoekNames.forEach(function(naam,i){
    var fId='foto-1d-'+i;
    var hId='hoek-1d-'+i;
    var fotoEntry=HOEK_FOTOS.find(function(x){return x.naam===naam;});
    if(fotoEntry){k.fotoLib.push({id:fId,naam:naam,data:fotoEntry.data,_c:true});}
    k.hoekLib.push({id:hId,naam:naam,maxKinderen:4,fotoId:fId,domein:'',doelIds:[]});
  });
  k.borden[0].hoekLibIds=k.hoekLib.map(function(h){return h.id;});
  k.hoekLib.forEach(function(h){k.borden[0].plaatsingen[h.id]=[];});
  G.klassen.push(k);
  save();
}


// ── FULLSCREEN ──────────────────────────────────────
function toggleFullscreen(){
  const btn=document.getElementById('fs-btn');
  if(!document.fullscreenElement&&!document.webkitFullscreenElement){
    const el=document.documentElement;
    (el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen).call(el).catch(()=>{});
  } else {
    (document.exitFullscreen||document.webkitExitFullscreen||document.mozCancelFullScreen).call(document).catch(()=>{});
  }
}
['fullscreenchange','webkitfullscreenchange'].forEach(ev=>document.addEventListener(ev,()=>{
  const btn=document.getElementById('fs-btn');
  if(btn) btn.textContent=(document.fullscreenElement||document.webkitFullscreenElement)?'✕':'⛶';
}));

G.klassen.forEach(k=>k.borden.forEach(b=>getBordHoeken(b,k).forEach(h=>{

  // Migratie: verwijder plaatsingen van niet-bestaande of lid=false leerlingen
  b.plaatsingen[h.id]=b.plaatsingen[h.id].filter(p=>k.leerlingen.find(l=>l.id===p.leerlingId&&l.lid!==false));

if(_ab.dagOpen){showScreen('board');renderBoard();}

else{showScreen('klasselect');renderKlasSelect();}
